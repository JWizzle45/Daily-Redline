name: The Daily Drive — Automotive Newsletter

on:
  schedule:
    # 6:00 AM PDT (UTC-7, Mar–Nov) = 13:00 UTC
    # 6:00 AM PST (UTC-8, Nov–Mar) = 14:00 UTC
    # This cron uses 13:00 UTC (correct for PDT).
    - cron: '0 13 * * *'

  # Allow manual trigger from GitHub Actions tab
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry run (no email sent)'
        required: false
        default: 'false'

jobs:
  send-newsletter:
    name: Generate and Send Newsletter
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run newsletter
        run: node auto-newsletter.js
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          SENDGRID_API_KEY:  ${{ secrets.SENDGRID_API_KEY }}
          FROM_EMAIL:        ${{ secrets.FROM_EMAIL }}
          TO_EMAIL:          ${{ secrets.TO_EMAIL }}
          DRY_RUN:           ${{ github.event.inputs.dry_run || 'false' }}
          MAX_ARTICLES:      20
